name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-pack:
    name: Build, test and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Runiq.Net.slnx

      - name: Build
        run: dotnet build Runiq.Net.slnx --no-restore -c Release -v:minimal

      - name: Test
        run: dotnet test Runiq.Net.slnx --no-build -c Release -v:minimal

      - name: Pack
        run: dotnet pack Runiq.Net.slnx --no-build -c Release -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: runiq-packages
          path: artifacts/packages/*.nupkg