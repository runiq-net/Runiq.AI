name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'badges/tests.json'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-test-pack:
    name: Build, test and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Runiq.AI.slnx

      - name: Build
        run: dotnet build Runiq.AI.slnx --no-restore -c Release -v:minimal

      - name: Test
        id: test
        continue-on-error: true
        run: dotnet test Runiq.AI.slnx --no-build -c Release -v:minimal --logger trx --results-directory TestResults

      - name: Update test badge
        if: always()
        shell: pwsh
        run: ./scripts/update-test-badge.ps1 -ResultsDirectory TestResults -OutputPath badges/tests.json

      - name: Commit test badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Badge updates only push from main so pull request builds validate the JSON
          # without trying to write to contributor branches or forks.
          if git diff --quiet -- badges/tests.json; then
            echo "Test badge is already up to date."
            exit 0
          fi

          git add badges/tests.json
          git commit -m "chore: update test badge [skip ci]"
          git push

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

      - name: Pack
        run: dotnet pack Runiq.AI.slnx --no-build -c Release -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: runiq-packages
          path: artifacts/packages/*.nupkg
